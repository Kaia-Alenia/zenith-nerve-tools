name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.tool }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        tool: [framegrid, giftly]
    defaults:
      run:
        working-directory: ./tools/${{ matrix.tool }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install ../../libs/alenia_bridge --break-system-packages
          python3 -m pip install -r requirements.txt nuitka ordered-set zstandard imageio --break-system-packages

      - name: Install dependencies (Windows/macOS)
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install ../../libs/alenia_bridge
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard imageio

      - name: Build with Nuitka (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          python3 -m nuitka --onefile --include-package=alenia_bridge --include-package=gi --output-filename=${{ matrix.tool }}.bin src/main.py

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --onefile --include-package=alenia_bridge --assume-yes-for-downloads --windows-console-mode=disable --output-filename=${{ matrix.tool }}.exe src/main.py

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m nuitka --mode=app --include-package=alenia_bridge --output-filename=${{ matrix.tool }} src/main.py

      - name: Package build (Ubuntu)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.tool }}-Linux.tar.gz ${{ matrix.tool }}.bin ../../LICENSE

      - name: Package build (Windows)
        if: runner.os == 'Windows'
        run: powershell Compress-Archive -Path ${{ matrix.tool }}.exe, ../../LICENSE -DestinationPath ${{ matrix.tool }}-Windows.zip

      - name: Package build (macOS)
        if: runner.os == 'macOS'
        run: |
          mv main.app ${{ matrix.tool }}.app
          mkdir -p ${{ matrix.tool }}.app/Contents/Resources
          cp ../../LICENSE ${{ matrix.tool }}.app/Contents/Resources/
          zip -r ${{ matrix.tool }}-macOS.zip ${{ matrix.tool }}.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool }}-${{ runner.os }}
          path: |
            tools/${{ matrix.tool }}/${{ matrix.tool }}-Linux.tar.gz
            tools/${{ matrix.tool }}/${{ matrix.tool }}-Windows.zip
            tools/${{ matrix.tool }}/${{ matrix.tool }}-macOS.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
